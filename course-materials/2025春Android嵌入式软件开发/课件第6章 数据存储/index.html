		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

- 基于XML格式的特点，共享参数主要用于如下场合：
	- 简单且孤立的数据。若是复杂且相互关联的数据，则要保存在关系数据库中。
	- 文本形式的数据。若是二进制数据，则要保存至文件。
	- 需要持久化存储的数据。App退出后再次启动时，之前保存的数据仍然有效。
- 在实际开发中，共享参数经常存储的数据包括：App的个性化配置信息，用户使用App的行为信息，临时需要保存的片段信息等。

- 虽然SharedPreferences用起来比较方便，但是在一些特殊场景会产生问题。比如共享参数保存的数据较多时，初始化共享参数会把整个文件加载进内存，加载耗时可能导致主线程堵塞。又如在调用apply方法保存数据时，频繁apply容易导致线程等待超时。为此Android官方推出了数据仓库 DataStore，并将其作为Jetpack库的基础组件。
- DataStore提供了两种实现方式，分别是Preferences DataStore和Proto DataStore，前者采用键值对存储数据，后者采用自定义类型存储数据。其中 Preferences DataStore可以直接替代SharedPreferences。

- SQL本质上是一种编程语言，它的学名叫作＂结构化查询语言＂（全称为Structured Query Language，简称SQL）。不过SQL语言并非通用的编程语言，它专用于数据库的访问和处理，更像是一种操作命令，所以常说SQL语句而不说SQL代码。标准的SQL语句分为 3 类：数据定义，数据操纵和数据控制。但不同的数据库往往有自己的实现。

- SQLite是一种小巧的嵌入式数据库，使用方便，开发简单。如同MySQL，Oracle那样，SQLite也采用SQL语句管理数据，由于它属于轻型数据库，不涉及复杂的数据控制操作，因此App开发只用到数据定义和数据操纵两类SQL语句。此外，SQLite的SQL语法与通用的SQL语法略有不同，接下来介绍的两类SQL语法全部基于SQLite。

// 把字符串保存到指定路径的文本文件
public static void saveText(String path, String txt) {
    // 根据指定的文件路径构建文件输出流对象
    try (FileOutputStream fos = new FileOutputStream(path)) {
        fos.write(txt.getBytes()); // 把字符串写入文件输出流
    } catch (IOException e) { // 更具体的异常类型
        e.printStackTrace();
    }
}
// 从指定路径的文本文件中读取内容字符串
```
```
public static String openText(String path) {
    StringBuilder readStr = new StringBuilder(); 
    // 使用 StringBuilder，根据指定的文件路径构建文件输入流对象
    try (FileInputStream fis = new FileInputStream(path)) {
        byte[] buffer = new byte[1024]; // 使用缓冲区读取
        int bytesRead;
        while ((bytesRead = fis.read(buffer)) != -1) {
            readStr.append(new String(buffer, 0, bytesRead)); 
            // 追加到 StringBuilder
        }
    } catch (IOException e) { // 更具体的异常类型
        e.printStackTrace();
    }
    return readStr.toString(); // 返回文本文件中的文本字符串
}

1. 检查 App 是否开启了指定权限
	- 权限检查需要调用 ContextCompat.checkSelfPermission 方法。该方法的第一个参数为活动实例（Activity），第二个参数为待检查的权限名称，例如存储卡的写权限名为 Manifest.permission.WRITE_EXTERNAL_STORAGE。注意 checkSelfPermission 方法的返回值，当它为 PackageManager.PERMISSION_GRANTED 时表示已经授权，否则就是未获授权。
2. 请求系统弹窗，以便用户选择是否开启权限
	- 一旦发现某个权限尚未开启，就得弹窗提示用户手工开启，这个弹窗不是开发者自己写的提醒对话框，而是系统专门用于权限申请的对话框。调用ActivityCompat的requestPermissions方法，即可命令系统自动弹出权限申请窗口，该方法的第一个参数为活动实例，第二个参数为待申请的权限名称数组，第三个参数为本次操作的请求代码。

- C/C++ 有全局变量的概念，因为全局变量保存在内存中，所以操作全局变量就是操作内存，显然内存的读写速度远比读写数据库或读写文件快得多。所谓全局，指的是其他代码都可以引用该变量，因此全局变量是共享数据和消息传递的好帮手。不过Java没有全局变量的概念，与之比较接近的是类里面的静态成员变量，该变量不但能被外部直接引用，而且它在不同地方引用的值是一样的 （前提是在引用期间不能改动变量值），所以借助静态成员变量也能实现类似全局变量的功能。
- 根据上一小节的介绍可知，Application的生命周期覆盖了App运行的全过程。不像短暂的 Activity生命周期，一旦退出该页面，Activity实例就被销毁。因此，利用Application的全生命特性，能够在Application实例中保存全局变量。

- 一个大规模的App工程，往往引入了数量繁多的第三方开发库，其中既有官方的Jetpack库，也有第三方厂商的开源包。有时候运行这种App会报错＂Cannot fit requested classes in a single dex file （＃methods： `$65894>65536$` ）＂，意思是App内部引用的方法数量超过了 65536 个，导致App异常退出。
- 原来Android的每个App代码都放在一个dex文件中，系统会把内部方法的索引保存在一个链表结构里，由于这个链表的长度变量是short类型（short类型的数字占两个字节共 16 位），使得链表的最大长度不能超过 65536 （2的16次方），因此若App方法数超过 65536 的话，链表索引溢出就报错了。为了解决方法数过多的问题，Android推出了名叫MultiDex的解决方案，也就是在打包时把应用分成多个dex文件，每个dex文件中的方法数量均不超过 65536 个，由此规避了方法数过多的限制。
</div>

- 虽然Android提供了数据库帮助器，但是开发者在进行数据库编程时仍有诸多不便，比如每次增加一张新表，开发者都得手工实现以下代码逻辑：
	- 重写数据库帮助器的onCreate方法，添加该表的建表语句。
	- 在插入记录之时，必须将数据实例的属性值逐一赋给该表的各字段。
	- 在查询记录之时，必须遍历结果集游标，把各字段值逐一赋给数据实例。
	- 每次读写操作之前，都要先开启数据库连接；读写操作之后，又要关闭数据库连接。
- 上述的处理操作无疑存在不少重复劳动，数年来引得开发者叫苦连连。为此各类数据库处理框架纷纷涌现，包括GreenDao，OrmLite，Realm等，可谓百花齐放。眼见SQLite渐渐乏人问津，谷歌公司干脆整了个自己的数据库框架——Room，该框架同样基于SQLite，但它通过注解技术极大地简化了数据库操作，减少了原来相当大一部分编码工作量。

```

- Android提供了四大组件，分别是活动Activity，广播Broadcast，服务Service和内容提供器 ContentProvider。其中内容提供器涵盖与内部数据存取有关的一系列组件，完整的内容组件由内容提供器ContentProvider，内容解析器ContentResolver，内容观察器ContentObserver三部分组成。
- ContentProvider给App存取内部数据提供了统一的外部接口，让不同的应用之间得以互相共享数据。像上一章提到的SQLite可操作应用自身的内部数据库，上传和下载功能可操作后端服务器的文件，而ContentProvider可操作当前设备其他应用的内部数据，它是一种中间层次的数据存储形式。

		Contact contact) {// 构建一个指向系统联系人提供器的 Uri 对象
    Uri rawUri = Uri.parse("content://com.android.contacts/raw_contacts");
    ContentValues values = new ContentValues(); // 创建新的配对
    // 往 raw_contacts 中添加联系人记录，并获取添加后的联系人编号
    long contactId = ContentUris.parseId(resolver.insert(rawUri, values));

    Uri dataUri = Uri.parse("content://com.android.contacts/data");

    name.put("raw_contact_id", contactId); // 往配对中添加联系人编号
```

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}
