		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

- onCreate方法所代表的创 建动作，正是一个活动最开始的行为，除了onCreate，活动还有其他几种生命周期行为，它们对应的方 法说明如下：
	- onCreate：创建活动。此时会把页面布局加载进内存，进入了初始状态。
	- onStart：开启活动。此时会把活动页面显示在屏幕上，进入了就绪状态。
	- onResume：恢复活动。此时活动页面进入活跃状态，能够与用户正常交互，例如允许响应用户的 点击动作、允许用户输入文字等。
	-  onPause：暂停活动。此时活动页面进入暂停状态（也就是退回就绪状态），无法与用户正常交 互。
	- onStop：停止活动。此时活动页面将不在屏幕上显示。
	- onDestroy：销毁活动。此时回收活动占用的系统资源，把页面从内存中清除掉。
	- onRestart：重启活动。处于停止状态的活动，若想重新开启的话，无须经历onCreate的重复创建 过程，而是走onRestart的重启过程。
	- onNewIntent：重用已有的活动实例。
</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="C0归纳总结/C02儿子成长/关于教育/assets/小飞英语/hero-background.svg" -->

- 上一小节的Java代码通过Intent对象设置活动的启动标志，这个Intent究竟是什么呢？Intent的中文名是意图，意思是我想让你干什么，简单地说，就是传递消息。Intent是各个组件之间信息沟通的桥梁，既能在Activity之间沟通，又能在Activity 与Service之间沟通，也能在Activity 与Broadcast之间沟通。总而言之，Intent用于Android各组件之间的通信，它主要完成下列3部分工作：
	- 标明本次通信请求从哪里来、到哪里去、要怎么走。
	- 发起方携带本次通信需要的数据内容，接收方从收到的意图中解析数据。

- （2）调用意图对象的setClass方法指定，示例代码如下

```Java
Intent intent = new Intent();
// 创建一个新的 Intent 对象
intent.setClass(this, ActNextActivity.class);
// 设置 Intent 要跳转的目标 Activity
// - this:  当前上下文 (通常指当前的 Activity)

```

- Bundle内部用于存放消息的数据结构是Map映射，既可添加或删除元素，还可判断元素是否存在。开发者若要把Bundle数据全部打包好，只需调用一次意图对象的putExtras方法；若要把Bundle数据全部取出来，也只需调用一次意图对象的getExtras方法

	- 活动只能一对一通信，而广播可以一对多，一人发送广播，多人接收处理。
	- 对于发送方来说，广播不需要考虑接收方有没有在工作，接收方在工作就接收广播，不在工作就丢弃广播。
	- 对于接收方来说，因为可能会收到各式各样的广播，所以接收方要自行过滤符合条件的广播，之后再解包处理。

- PendingIntent代表延迟的意图，它指向的组件不会马上被激活；而Intent代表实时的意图，一旦被启动，它指向的组件就会马上被激活。
- PendingIntent是一类消息的组合，不但包含目标的Intent对象，还包含请求代码、请求方式等信息。

- 诚然这种立即绑定体现不了差异化情况，为了更好地说明绑定方式的优势，Android还提供了另一种延迟绑定。延迟绑定与立即绑定的区别在于：延迟绑定要先通过startService方法启动服务，再通过bindService方法绑定已存在的服务；同理，延迟解绑要先通过unbindService方法解绑服务，再通过stopService方法停止服务。这样一来，因为启动操作在先、绑定操作在后，所以解绑操作只能撤销绑定操作，而不能撤销启动操作。由于解绑操作不能销毁服务，因此存在再次绑定服务的可能。
