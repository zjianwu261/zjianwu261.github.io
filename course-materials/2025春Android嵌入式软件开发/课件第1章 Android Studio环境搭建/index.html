		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};


        </script>

安卓（Android）是一种基于Linux内核（不包含GNU组件）的自由及开放源代码的操作系统。主 要使用 于移动设备，如智能手机和平板电脑，由美国Google公司和开放手机联盟领导及开发。 Android操作系 统最初由Andy Rubin开发，主要支持手机。
- 2005年8月由Google收购注资。
- 2007年11月，Google与84家硬件制造商、软件开发商及电信营运商组建开放手机联盟共同 研发改 良Android系统，并发布了Android的源代码。

<div class="" style="position: absolute; left: 12%; top: 20%; height: 65%; width: 76%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

- 第一部Android智能手机发布于2008年10月，由 HTC 公司制造。Android逐渐扩展到平板电 脑及 其他领域上，如电视、数码相机、游戏机、智能手表、车载大屏、智能家居等，并逐 渐成为了人们 日常生活中不可或缺的系统软件。
- 2011年第一季度，Android在全球的市场份额首次超过塞班系统，跃居全球第一。
- 2013年的第四季度，Android平台手机的全球市场份额已经达到78.1%。2013年09月24日谷 歌开 发的操作系统Android在迎来了5岁生日，全世界采用这款系统的设备数量已经达到10 亿台。
- 2019年，谷歌官方宣布全世界有25亿活跃的Android设备，还不包含大多数中国设备。

- 虽然Android基于Linux内核，但是Android手机的应用App主要采用Java语言开发。为了吸引众多 的Java 程序员，早期的App开发工具使用Eclipse，通过给Eclipse安装ADT插件，使之支持开发 和调试App。然 而Eclipse毕竟不是专门的App开发环境，运行速度也偏慢，因此谷歌公司在2013 年5月推出了全新的 Android开发环境—Android Studio。
- Android Studio基于IntelliJ IDEA演变而 来，既保持了IDEA方便快 捷的特点，又增加了Android开发的环境支持。自2015年之后，谷歌公 司便停止了ADT的版本更新，转 而重点打造自家的Android Studio，数年升级换代下来，Android Studio的功能愈加丰富，性能也愈高 效，使得它逐步成为主流的App开发环境

工欲善其事，必先利其器。要想保证Android Studio的运行速度，开发用的电脑配置就要跟上。 现在一 般用笔记本电脑开发App，下面是对电脑硬件的基本要求：
- 内存要求至少8GB，越大越好。 
- CPU要求1.5GHz以上，越快越好。 
- 硬盘要求系统盘剩余空间10GB以上，越大越好。 
- 要求带无线网卡与USB插槽。

- 必须是64位系统，不能是32位系统。 
- Windows系统至少为Windows 7，推荐Windows 10，不支持Windows XP

下面是对网络的基本要求：
- 最好连接公众网，因为校园网可能无法访问国外的网站
- 下载速度至少每秒1MB，越快越好。因为Android Studio安装包大小为1GB左右，还需要另 外下 载几百MB的SDK，所以网络带宽一定要够大，否则下载文件都要等很久。

- 依次选择菜单Build→Make Project，该方式会编译整个项目下的所有模块
- 依次选择菜单Build→Make Module ***，该方式会编译指定名称的模块
- 先选择菜单Build→Clean Project，再选择菜单Build→Rebuild Project，表示先清理当前项 目，再 对整个项目重新编译。

有别于System.out.println，Log工具将各类日志划分为5个等级，每个等级的重要性是不一样的， 这些 日志等级按照从高到低的顺序依次说明如下：
- Log.e：表示错误信息，比如可能导致程序崩溃的异常。 
- Log.w：表示警告信息。 
- Log.i：表示一般消息。 
- Log.d：表示调试信息，可把程序运行时的变量值打印出来，方便跟踪调试。 
- Log.v：表示冗余信息。
</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="C0归纳总结/C02儿子成长/关于教育/assets/小飞英语/hero-background.svg" -->
