		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

- App是在手机上运行的一类应用软件，而应用软件依附于操作系统，无论电脑还是手机，刚开机 都会显示桌面，这个桌面便是操作系统的工作台。
- 个人电脑的操作系统主要有微软的Windows和 苹果的MacOS，智能手机流行的操作系统也有两种，分别是安卓手机的Android和苹果手机的 iOS。
- 本书讲述的App开发为Android上的应用开发，Android系统基于Linux内核，但不等于Linux 系统，故App应用无法在Linux系统上运行。
</div>

<div class="" style="position: absolute; left: 10%; top: 20%; height: 60%; width: 80%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

- Android Studio是谷歌官方推出的App开发环境，它提供了三种操作系统的安装包，分别是 Windows、 Mac和Linux。这就产生一个问题：开发者可以在电脑上安装Android Studio，并使用 Android Studio开 发App项目，但是编译出来的App在电脑上跑不起来。
- 这种情况真是令人匪夷所思的，通常学习C语言、 Java或者Python，都能在电脑的开发环境直接观看程序运行过程，就 算是J2EE开发，也能在浏览器通过 网页观察程序的运行结果。可是安卓的App应用竟然没法在 电脑上直接运行，那该怎样验证App的界面 展示及其业务逻辑是否正确呢？
</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="C0归纳总结/C02儿子成长/关于教育/assets/小飞英语/hero-background.svg" -->

<div class="" style="position: absolute; left: 10%; top: 20%; height: 65%; width: 80%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

- 为了提供App开发的功能测试环境，一种办法是利用Android Studio创建内置的模拟器，然后启动 内置 模拟器，再在模拟器上运行App应用
- 另一种办法是使用真实手机测试App，该办法在实际开发中更为常见。由于模拟器本身跑在电脑 上面， 占用电脑的CPU和内存，会拖累电脑的运行速度；况且模拟器仅仅是模拟而已，无法完 全验证App的所 有功能，因此最终都得通过真机测试才行
</div>

- 使用数据线把手机连到电脑上
	- 在电脑上安装手机的驱动程序，一般电脑会把手机当作USB存储设备一样安装驱动，大多数情况会自动安装成功。如果遇到少数 情况安 装失败，需要先安装手机助手，由助手软件下载并安装对应的手机驱动
	- 打开手机的开发者选项并启用USB调试。手机出厂后默认关闭开发者选项，需要开启开发者选项才能调试App。打开手机的设置菜单，进 入“系统” →“关于手机”→“版本信息”页面，这里有好几个版本项，每个版本项都使劲点击七、八 下，总会有某个版 本点击后出现“你将开启开发者模式”的提示。继续点击该版本开启开发者模 式，然后退出并重新进入设 置页面，此时就能在“系统”菜单下找到“开发者选项”或“开发人员选 项”了。进入“开发者选项”页面，启用 “开发者选项”和“USB调试”两处开关，允许手机通过USB接 口安装调试应用。
	- 将连接的手机设为文件传输模式，并允许计算机进行USB调试。

- 基于安卓系统的App开发主要有两大技术路线，分别是原生开发和混合开发。原生开发指的是在 移动平台上利用官方提供的编程语言（例如Java、Kotlin等）、开发工具包（SDK）、开发环境 （Android Studio）进行App开发；
- 混合开发指的是结合原生与H5技术开发混合应用，也就是将 部分App页面改成内嵌的网页，这样无须升级App、只要覆盖服务器上的网页，即可动态更新App 页面。
- 不管是原生开发还是混合开发，都要求掌握Android Studio的开发技能，因为混合开发本质上依 赖于原生开发，如果没有原生开发的皮，哪里还有混合开发的毛呢？单就原生开发而言，又涉及 多种编程语言，包括Java、Kotlin、C/C++、XML等

- Android Studio已经自带了JRE。依次选择菜单Settings> Build, Execution, Deployment > Build Tools > Gradle，弹出如图所示的项目结构对话框
- 这个 JRE 是由 JetBrains 提供的，用于支持 Android Studio 的开发环境。它通常用于运行 Android Studio 及其插件
- Gradle JDK 被设置为使用这个 JRE，这意味着 Gradle 构建工具将使用这个特定的 Java 环境来执行构建任务。这样做可以确保构建过程使用与 Android Studio 兼容的 Java 版本，避免版本冲突。

2.1 App的开发特点：运行环境 | App的开发语言Kotlin

- Kotlin是谷歌官方力推的又一种编程语言，它与Java同样基于JVM（Java Virtual Machine，即 Java虚拟 机），且完全兼容Java语言。创建新项目时，在Language栏下拉可选择Kotlin，此时 项目结构对话框如图所示。 
- 一旦在创建新项目时选定Kotlin，该项目就会自动加载Kotlin插件，并将Kotlin作为默认的编程语言。不过本课讲述的App开发采用Java编程，未涉及Kotlin编程。
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="C0归纳总结/C02儿子成长/关于教育/assets/小飞英语/hero-background.svg" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="has-dark-background" style="background-color: #6a7962; padding: 0 20px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

2.1 App的开发特点：运行环境 | App的开发语言C/C++
</div>
<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 5%; top: 20%; height: 65%; width: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="position: absolute; left: 5%; top: 20%; height: 65%; width: 90%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

- 不管是Java还是Kotlin，它们都属于解释型语言，这类语言在运行之时才将程序翻译成机器语 言，故而执 行效率偏低。虽然现在手机配置越来越高，大多数场景的App运行都很流畅，但是涉 及图像与音视频处理等复杂运算的场合，解释型语言的性能瓶颈便暴露出来。
- 编译型语言在首次编译时就将代码编译为机器语言，后续运行无须重新编译，直接使用之前的编 译文件 即可，因此执行效率比解释型语言高。C/C++正是编译型语言的代表，它能够有效弥补解 释型语言的性 能缺憾，借助于JNI技术（Java Native Interface，即Java原生接口），Java代码 允许调用C/C++编写的程 序。事实上，Android的SDK开发包内部定义了许多JNI接口，包括图像 读写在内的底层代码均由 C/C++编写，再由外部通过封装好的Java方法调用。
- 不过Android系统的JNI编程属于高级开发内容，初学者无须关注JNI开发，也不要求掌握C/C++。
</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="C0归纳总结/C02儿子成长/关于教育/assets/小飞英语/hero-background.svg" -->

- 每个XML标签都是独立的控件对象，标签内部的属性以“android:”打头，表示这 是标准的安卓属性，各属性分别代表控件的某种规格

可见AndroidManifest.xml的根节点为manifest，它的package属性指定了该App的包名。manifest 下 面有个application节点，它的各属性说明如下：
- android: allowBackup，是否允许应用备份。允许用户备份系统应用和第三方应用的apk安装 包和 应用数据，以便在刷机或者数据丢失后恢复应用，用户即可通过adb backup和adb restore来进行 对应用数据的备份和恢复。为true表示允许，为false则表示不允许。
- android: icon，指定App在手机屏幕上显示的图标。 
- android: label，指定App在手机屏幕上显示的名称。 
- android: roundIcon，指定App的圆角图标。 
- android: supportsRtl，是否支持阿拉伯语／波斯语这种从右往左的文字排列顺序。为true表 示支 持，为false则表示不支持。 
- android: theme，指定App的显示风格。
</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="C0归纳总结/C02儿子成长/关于教育/assets/小飞英语/hero-background.svg" -->

```xml
<intent-filter>
	<action android:name="android.intent.action.MAIN" / >
	<category android:name="android.intent.category.LAUNCHER" / >
</intent-filter>
```
- 注意到application下面还有个activity节点，它是活动页面的注册声明，只有在 AndroidManifest.xml中 正确配置了activity节点，才能在运行时访问对应的活动页面
- 初始配置 的MainActivity正是App的默认 主页，之所以说该页面是App主页，是因为它的activity节点内部还 配置了上面的过滤信息
- 其中action节点设置的android.intent.action.MAIN表示该页面是App的入口页面，启动App时会最 先打 开该页面。而category节点设置的android.intent.category.LAUNCHER决定了是否在手机屏 幕上显示 App图标，如果同时有两个activity节点内部都设置了 android.intent.category.LAUNCHER，那么桌面就 会显示两个App图标。以上的两种节点规则可 能一开始不太好理解，读者只需记住默认主页必须同时配 置这两种过滤规则即可
</div>
</div></script></section></section><section ><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="C0归纳总结/C02儿子成长/关于教育/assets/小飞英语/hero-background.svg" -->

- 一个 界面也是先有根节点（相当于树干），根节点下面挂着若干布局节点（相当于树枝），布局节点下面再挂着控件节点 （相当于树叶）。因为树叶已经是末梢了，不会再包含其他节点，所以末梢 节点允许采用“/>”这种简写 方式。
</div>

- 根节点其实是特殊的布局节点，它的标签名称可以跟布局节点 一样，区别之处在于下列两点：
	- 每个界面只有一个根节点，却可能有多个布局节点，也可能没有中间的布局节点，此时所有 控件节 点都挂在根节点下面。
	- 根节点必须配备“xmlns:android="http://schemas.android.com/apk/res/android"”， 表示指定 XML内部的命名空间，有了这个命名空间，Android Studio会自动检查各节点的属性名称是 否合法，如 果不合法就提示报错。至于布局节点就不能再指定命名空间了。
- 有了根节点、布局节点、控件节点之后，XML内容即可表达丰富多彩的界面布局，因为每个界面 都能划 分为若干豆腐块，每个豆腐块再细分为若干控件罢了。三种节点之外，尚有“”这类注释标 记，它的作用 是包裹注释性质的说明文字，方便其他开发者理解此处的XML含义。

public class MainActivity extends AppCompatActivity {  
  
    @Override  
    protected void onCreate(Bundle savedInstanceState) {  
        super.onCreate(savedInstanceState);  
        EdgeToEdge.enable(this);  
        setContentView(R.layout.activity_main);  
        ViewCompat.setOnApplyWindowInsetsListener(findViewById(R.id.main), (v, insets) -> {  
            Insets systemBars = insets.getInsets(WindowInsetsCompat.Type.systemBars());  
            v.setPadding(systemBars.left, systemBars.top, systemBars.right, systemBars.bottom);  
            return insets;  
        });  
    }  
}

- 一旦创建好新页面，就得在合适的时候跳到该页面，假设出发页面为A，到达页面为B，那么跳转 动作是 从A跳到B。由于启动App会自动打开默认主页MainActivity，因此跳跃的起点理所当然在 MainActivity， 跳跃的终点则为目标页面的Activity。这种跳转动作翻译为Android代码，格式形 如“startActivity(new Intent(源页面.this, 目标页面.class));”。如果目标页面名为Main2Activity，跳 转代码便是下面这样的：
```Java
//活动页面跳转，从MainActivity跳到Main2Activity 
startActivity(new Intent(MainActivity.this, Main2Activity.class));
```
- 因为跳转动作通常发生在当前页面，也就是从当前页面跳到其他页面，所以不产生歧义的话，可 以使用 this指代当前页面。简化后的跳转代码如下所示：
```Java
startActivity(new Intent(this, Main2Activity.class));
```

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];

          }
        }
        return target;

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){

	} else {

	}
