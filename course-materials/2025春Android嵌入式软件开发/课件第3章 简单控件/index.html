		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};


        </script>

	- “px”是“pixel”的缩写，意思是像素。在手机屏幕显示领域，它表示屏幕的最小显示单位。手机屏幕是由一个个像素点组成的，每个像素点可以显示不同的颜色和亮度，从而组合成各种图像和文字。

- <mark>像素（Pixel, px）</mark>也称为图像元素，是图像构成的基本单元。单个像素的大小并不固定，它会随着屏幕大小和像素数量的关系而变化。一个像素点为 `1px`。
- <mark>分辨率（Resolution）</mark>是指屏幕的垂直和水平方向的像素数量。例如，如果分辨率是 `1920*1080`，则表示：
	- 垂直方向有 `1920` 个像素。
	- 水平方向有 `1080` 个像素。
- <mark>像素密度（Dots Per Inch，dpi）</mark>是指屏幕上每英寸（`1英寸 = 2.54厘米`）距离中有多少个像素点。  
	- 公式：  dpi=屏幕对角线像素数/屏幕对角线英寸数
	- 例如，iPhone 的 Retina 屏幕通常具有 300 dpi 以上的像素密度。
</div>

- <mark>密度（Density）</mark>指屏幕上每平方英寸（1 平方英寸 = 2.54² 平方厘米）中包含的像素数量。
	- 密度=水平像素数×垂直像素数/屏幕面积（平方英寸）
	- 密度是衡量屏幕显示细腻程度的另一种方式。
- 设备独立像素（Density-Independent Pixel, dp/dip）一种与设备密度无关的长度单位，用于在不同设备上实现一致的显示效果。
	- px=dp×(dpi/160) 其中，160 dpi 是基准密度（Android 标准）。
	- 在不同密度的设备上，1 dp 会转换为不同的像素值，但显示效果保持一致。例如，在 320 dpi 的设备上，1 dp = 2 px。

- 除了方向之外，线性布局还有一个权重概念，所谓权重，指的是线性布局的下级视图各自拥有多大比例的宽高。
- 比如一块蛋糕分给两个人吃，可能两人平均分，也可能甲分三分之一，乙分三分之二。两人平均分的话，先把蛋糕切两半，然后甲分到一半，乙分到另一半，此时甲乙的权重比为1:1。甲分三分之一、乙分三分之二的话，先把蛋糕平均切成三块，然后甲分到一块，乙分到两块，此时甲乙的权重比为 1:2。就线性布局而言，它自身的尺寸相当于一整块蛋糕，它的下级视图们一起来分这个尺寸蛋糕，有的 视图分得多，有的视图分得少。
- 分多分少全凭每个视图分到了多大的权重，这个权重在XML文件中通过 属性android:layout\_weight来表达。
</div>

- 在这样的业务场景中，按钮先后拥 有两种状态，即不可用状态与可用状态，它们在外观和功能上的区别如下：
	- 不可用按钮：按钮不允许点击，即使点击也没反应，同时按钮文字为灰色。
	- 可用按钮：按钮允许点击，点击按钮会触发点击事件，同时按钮文字为正常的黑色。

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 5%; top: 15%; height: 70%; width: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="line-height: 1.5; position: absolute; left: 5%; top: 15%; height: 70%; width: 90%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

- 常见的按钮控件Button其实是文本按钮，因为按钮上面只能显示文字，不能显示图片，ImageButton才 是显示图片的图像按钮。虽然ImageButton号称图像按钮，但它并非继承Button，而是继承了 ImageView，所以凡是ImageView拥有的属性和方法，ImageButton统统拿了过来，区别在于 ImageButton有个按钮背景。 尽管ImageButton源自ImageView，但它毕竟是个按钮呀，按钮家族常用的点击事件和长按事件， ImageButton全都没落下。不过ImageButton和Button之间除了名称不同，还有下列差异：
	- Button既可显示文本也可显示图片（通过setBackgroundResource方法设置背景图片），而 ImageButton只能显示图片不能显示文本。
	- ImageButton上的图像可按比例缩放，而Button通过背景设置的图像会拉伸变形，因为背景图采取 fitXY方式，无法按比例缩放。
	- Button只能靠背景显示一张图片，而ImageButton可分别在前景和背景显示图片，从而实现两张图 片叠加的效果。
</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" data-background-image="C0归纳总结/C02儿子成长/关于教育/assets/小飞英语/hero-background.svg" -->

</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 5%; top: 20%; height: 65%; width: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="line-height: 1.5; position: absolute; left: 5%; top: 20%; height: 65%; width: 90%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

- 从上面可以看出，Button与ImageButton各有千秋，通常情况使用Button就够用了。但在某些场合，比如输入法打不出来的字符，以及特殊字体显示的字符串，就适合先切图再放到ImageButton。
- 举个例 子，数学常见的开平方运算，由输入法打出来的运算符号为“√”，但该符号缺少右上角的一横，正确的开平方符号是带横线的，此时便需要通过ImageButton显示这个开方图片。

		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
