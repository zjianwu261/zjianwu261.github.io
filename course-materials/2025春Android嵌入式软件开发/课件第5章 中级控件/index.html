		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

- drawable-ldpi里面存放低分辨率的图片（如240x320），现在基本没有这样的智能手机了。
- drawable-mdpi里面存放中等分辦率的图片（如320x480），这样的智能手机已经很少了。
- ﻿drawable-hdpi里面存放高分辨率的图片（如480x800），一般对应4英寸～4.5英寸的手机（但不绝对，同尺寸的手机有可能分辨率不同，手机分辨率就高不就低，因为分辦率低了屏幕会有模糊的感觉）。
- ﻿﻿drawable-xhdpi里面存放加高分辦率的图片（如720x1280），一般对应5英寸～5.5英寸的手机。
- drawable-xxhdpi里面存放超高分辨率的图片（如1080x1920），一般对应6英寸～6.5英寸的手机。
- ﻿﻿drawable-xx xhdpi里面存放超超高分辨率的图片（如1440x2560），一般对应7英寸以上的平板计算机。
</div>

- 基本上，分辨率每加大一级，宽度和高度就要增加二分之一或三分之一像素。如果各目录存在同名图片，Android就会根据手机的分辨率分别适配对应文件夹里的图片。在开发App时，为了兼容不同的手机屏幕，在各目录存放不同分辨率的图片，才能达到最合适的显示效果。例如，在drawable-hdpi里放了一张背景图片bgpng（分辨率为480X800），其他目录没放，使用分辨率为480X800的手机查看该App界面没有问题，但是使用分辨率为720X1280的手机查看该App会发现背景图片有点模糊，原因是Android为了让bgpng适配高分辨率的屏幕，强行把bg.png拉伸到了720X1280，拉伸的后果是图片变模糊了。
- 在xml 布局文件中引用图形文件可使用“@drawable/不含扩展名的文件名称”这种形式，如各视图的background属性、ImageView 和ImageButton的src属性、TextView 和Button四个方向的drawable***系列属性都可以引用图形文件。

- 所谓单选按钮，指的是在一组按钮中选择其中一项，并且不能多选，这要求有个容器确定这组按钮的范围，这个容器便是单选组RadioGroup。单选组实质上是个布局，同一组RadioButton都要放在同一个RadioGroup节点下。RadioGroup提供了orientation属性指定下级控件的排列方向，该属性为horizontal时，单选按钮在水平方向排列；该属性为vertical时，单选按钮在垂直方向排列。RadioGroup 下面除了RadioButton，还可以挂载其他子控件（如TextView、ImageView等）。如此看来，单选组相当于特的线性布局，它们主要有以下两个区别：
	- （1）单选组多了管理单选按钮的功能，而线性布局不具备该功能。
	- （2）如果不指定orientation属性，那么单选组默认垂直排列，而线性布局默认水平排列。

- 然而实际运行App却发现，先输入手机号码再输入密码，一开始并不会触发密码框的点击事件，再次点击密码框才会触发点击事件。缘由是编辑框比较特殊，要点击两次后才会触发点击事件，因为第一次点击只触发焦点变更事件，第二次点击才触发点击事件。编辑框的焦点，直观上就看那个闪动的光标，哪个编辑框有光标，焦点就落在哪里。光标在编辑框之间切换，便产生了焦点变更事件，所以对于编辑框来说，应当注册焦点变更监听器，而非注册点击监听器。

}

	- 这里有个细微的用户体验问题：用户会去找回密码，肯定是发现输入的密码不对；那么修改密码后回到登录页面，如果密码框里还是刚才的错误密码，用户只能先清空错误密码，然后才能输入新密码。一个App要想让用户觉得好用，就得急用户之所急，想用户之所想，像刚才那个错误密码的情况，应当由App在返回登录页面时自动清空原来的错误密码。自动清空密码框的操作，放在onActivityResult方法中处理是个办法，但这样有个问题，如果用户直接按返回键回到登录页面，那么onActivityResult方法发现数据为空便不做处理。因此应该这么处理：判断当前是否为返回页面动作，只要是从找回密码页面返回到当前页面，则不管是否携带应答参数，都要自动清空密码输入框。对应的Java代码则为重写登录页面的onRestart方法，在该方法中强制清空密码。这样一来，不管用户是修改密码完成回到登录页面，还是点击返回键回到登录页面，App都会自动清空密码框了

- 2、关于自动隐藏输入法面板
	- 在输入手机号码或者密码的时候，屏幕下方都会弹出输入法面板，供用户按键输入数字和字母。但是输入法面板往往占据屏幕下方大块空间，很是碍手碍脚，用户输入完 11 位的手机号码时，还得再按一下返回键来关闭输入法面板，接着才能继续输入密码。
	- 理想的做法是：一旦用户输完 11位手机号码，App就要自动隐藏输入法面板。同理，一旦用户输完6位密码或者6位验证码，App也要自动隐藏输入法面板。要想让App具备这种智能的判断功能，就得给文本编辑框添加监听器，只要当前编辑框输入文本长度达到 11 位或者和 6 位，App就自动隐藏输入法面板。

// 定义一个编辑框监听器,在输入文本达到指定长度时自动隐藏输入法软键盘
private class HideTextWatcher implements TextWatcher {
    private EditText mView; // 声明一个编辑框对象
    private int mMaxLength; // 声明一个最大长度变量
    public HideTextWatcher(EditText v, int maxLength) {
        super();
        mView = v;
        mMaxLength = maxLength;
    }
    @Override // 在编辑框的输入文本变化前触发
    public void beforeTextChanged(CharSequence s, int start, 
		    int count, int after) {}
```
```Java
    @Override  // 在编辑框的输入文本变化时触发
    public void onTextChanged(CharSequence s, int start, 
		    int before, int count) {} // 更正了方法名
    @Override // 在编辑框的输入文本变化后触发
    public void afterTextChanged(Editable s) {
		    String str = s.toString(); // 获得已输入的文本字符串
        // 输入文本达到11位(如手机号码),或者达到6位(如登录密码)时
        // 关闭输入法软键盘
        if ((str.length() == 11 && mMaxLength == 11)
                || (str.length() == 6 && mMaxLength == 6)) {
            // 隐藏输入法软键盘
            ViewUtil.hideOneInputMethod(LoginMainActivity.this, 
		            mView); // 假设你的工具类是 ViewUtil
        }
    }
}
