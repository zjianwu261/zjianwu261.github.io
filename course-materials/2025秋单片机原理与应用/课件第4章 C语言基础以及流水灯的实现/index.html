			const itemsToFit = document.getElementsByClassName('fitText');

				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];

				}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}

<aside class="notes"><p>我们生活中最习惯的是<strong>十进制</strong>，规则是“逢十进一”。</p>
<p>但在计算机的世界里，它只认识0和1，也就是<strong>二进制</strong>，规则是“逢二进一”。比如数字1就是1，数字2在二进制里是10，3是11。<strong>那大家想一想，数字4用二进制怎么表示？</strong></p>
<p>（稍作停顿）</p>
<p>没错，是100。但是二进制写起来太长了，不方便，所以我们程序员更常用的是<strong>十六进制</strong>。大家可以把它看作是二进制的一种简写，因为一位十六进制数，正好能表示四位二进制数。它的规则是“逢十六进一”，用0到9，还有A到F来表示。在C语言里，我们用<code>0x</code>前缀来表示一个十六进制数，比如<code>0xFF</code>。</p>
<p>大家不要觉得复杂，它们只是表示同一个数值的不同方式。就像中文的“三”、阿拉伯数字“3”和罗马数字“Ⅲ”，本质上都是一个东西。</p>

- **常量:** 在程序中值固定不变的量。
- **变量:** 值可以根据程序需要灵活改变的符号。

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >

<aside class="notes"><p>在编程中，我们会处理各种数据。这些数据分为两类：<strong>常量</strong>和<strong>变量</strong>。</p>
<ul>
<li><strong>常量</strong>，顾名思义，就是在程序运行期间，值固定不变的量。就像你的银行卡号，是固定不变的。</li>
<li><strong>变量</strong>，则是程序里值可以灵活改变的符号。就像你银行卡里的余额，存钱、取钱都会让它变化。</li>
</ul>
<p>在单片机里，变量非常重要，我们可以用它来存储传感器的读数、按键按下的次数，或者某个LED灯的状态等等。</p>

问：`unsigned char`它的范围中255是怎么来的吗？变量溢出会怎么样？
</div>

<aside class="notes"><p>既然要存储数据，我们就需要给数据找一个“窝”。这个“窝”就是变量，而“窝”的大小和类型，就是<strong>数据类型</strong>。就像我们用小盒子装首饰，用大箱子装被子一样。</p>
<p>C语言里有几种基本的数据类型，大家看屏幕：<code>char</code>（字符型）占1个字节，<code>int</code>（整型）占2个字节，<code>long</code>（长整型）和<code>float</code>（浮点型）占4个字节。</p>
<p>这里有一个非常重要的概念，就是<strong>有符号（signed）</strong>和<strong>无符号（unsigned）</strong>。</p>
<ul>
<li>有符号的类型，就像能显示零下温度的温度计，可以表示负数。</li>
<li>而无符号类型，只能表示0和正数。</li>
</ul>
<p>比如一个<code>unsigned char</code>，它的范围是0到255。<strong>那么大家知道这个255是怎么来的吗？</strong> 因为1个字节是8位，每一位都有0或1两种可能，所以是256种状态，从0开始计数就是0到255。</p>
<p>大家想一下，如果我往一个最大容量是255毫升的杯子里，倒入256毫升的水，会怎么样？对，会<strong>溢出</strong>。程序里也一样，一个值为255的<code>unsigned char</code>变量，你再给它加1，它不会变成256，而是会像汽车里程表一样翻转，变回到0。这就是<strong>变量溢出</strong>，是编程里一个常见的错误来源。</p>

- **后缀 (`a++`):** 先使用变量当前的值，然后再将其加1（先用后加）。

<aside class="notes"><p>有两个非常常用的运算符：<code>++</code>（自增）和<code>--</code>（自减），就是加1和减1。</p>
<p>它们俩有个有趣的区别，就是可以放在变量前面（前缀），也可以放在后面（后缀）。</p>
<ul>
<li><strong>后缀 <code>a++</code></strong> 是“先用后加”：先使用a的当前值，然后再给a加1。</li>
<li><strong>前缀 <code>++a</code></strong> 是“先加后用”：先给a加1，然后再使用这个新的值。</li>
</ul>
<p>我们看例子：<code>b = a++;</code>，如果a是5，那么先把5赋给b，然后a自己变成6。如果是 <code>b = ++a;</code>，a先从5变成6，再把这个新的值6赋给b。</p>

<aside class="notes"><p>好的，同学们，我们继续。</p>
<p>到目前为止，我们已经学习了如何定义变量，也了解了如何使用各种运算符（如 <code>+</code>, <code>-</code>, <code>*</code>, <code>/</code>, <code>++</code>）对这些变量进行计算。但计算出结果后，我们如何将这个结果保存起来呢？这就需要用到我们接下来要讲的，在编程中最为核心和基础的操作之一——**赋值 (Assignment)**。</p>
<p>这里大家一定要记住一个核心概念：在C语言里，单个等号不是数学上的“等于”，而是一个<strong>动作</strong>，一个指令！它的意思是，把右边的值，“装到”左边的变量里去。数据的流向永远是<strong>从右到左</strong>。</p>
<p>我们还有一些复合赋值运算符，比如 <code>+=</code>、<code>-=</code> 等。<code>a += 5;</code> 就是 <code>a = a + 5;</code> 的简写。<strong>那么，<code>a *= 3;</code> 展开来应该是什么样的呢？</strong> 对，就是<code>a = a * 3;</code>。注意，运算符中间不能有空格。</p>

<aside class="notes"><p>“好的，同学们。我们已经学会了如何给变量赋值和进行算术运算。但到目前为止，我们的程序还只会像计算器一样，按照我们写好的顺序一步一步往下走。真正的智能程序是需要具备<strong>判断能力</strong>和<strong>决策能力</strong>的。比如，当温度高于30度时，就打开风扇；当按键被按下时，就点亮LED灯。”</p>
<p>“要实现这种智能控制，我们的程序就必须能够回答‘是’或‘否’的问题。‘温度是不是高于30度了？’、‘按键是不是被按下了？’。要回答这些问题，我们就必须学习一套全新的工具——<strong>关系运算符</strong>。”</p>
<p>在单片机编程中，这套工具是我们编写所有智能逻辑的绝对基础。无论是控制程序的流程、还是判断传感器数据是否达到阈值，都离不开它。可以说，掌握了它，才能让我们的程序真正‘活’起来。”</p>
<p>“那么，到底什么是关系运算符呢？其实顾名思义，它就是用来<strong>比较两个值之间的关系</strong>的，说白了，就是比大小、比是否相等。”</p>
<p>“这里它和我们之前学的加减乘除有一个本质区别。<code>a + b</code> 会得到一个具体的数字，但 <code>a &gt; b</code> 这样的关系运算，它得到的结果只有两种可能：‘条件成立’或者‘条件不成立’。我们专业一点，称之为真 (True)或 假 (False)。”</p>
<p>在C语言的规则里，它并不会直接返回一个叫‘真’或‘假’的东西，而是用我们熟悉的整数来代表：</p>
<ul>
<li>如果条件成立，也就是**真 (True)**，就用整数 <strong><code>1</code></strong> 来表示。</li>
<li>如果条件不成立，也就是**假 (False)**，就用整数 <strong><code>0</code></strong> 来表示。</li>
</ul>
<p>C语言为我们提供了这六种常见的关系运算符，它们最终的值，要么是<code>1</code>，要么是<code>0</code>。”</p>
<p>以左下角的代码为例。
核心是两个 <code>if</code> 语句，它们在不断地做“是”或“否”的判断。而这些判断，都离不开我们今天要讲的两个问题。</p>
<ul>
<li>第一个问题：<code>temperature &gt; 30</code> 的结果是什么？</li>
</ul>
<p>这是一个<strong>关系运算表达式</strong>，它不是一个操作，而是一个“提问”。它在问：“变量 <code>temperature</code> 的值是否大于 30？”</p>
<ul>
<li>在这个例子中，<code>temperature</code> 的值是 <strong>35</strong>。</li>
<li>35 大于 30，所以这个问题的答案是“是”。</li>
</ul>
<p>在 C 语言中，这种“是”或“否”的结果是用<strong>整数 1 和 0</strong> 来表示的。<strong>“真”（是）用 1 表示，“假”（否）用 0 表示</strong>。因此，<code>temperature &gt; 30</code> 这个表达式的最终结果就是 <strong>1</strong>。<code>if</code> 语句看到这个 1，就知道条件成立，于是执行大括号里的代码。</p>
<ul>
<li>第二个问题：如果把 <code>while(1)</code> 改成 <code>while(-10)</code>，是否成立？</li>
</ul>
<p>答案是：<strong>成立</strong>。</p>
<p>这是 C 语言中一个非常重要的规则：<strong>任何非零值都被视为“真”，只有 0 被视为“假”</strong>。</p>
<p><code>while</code> 循环正是基于这个规则来工作的。它会检查括号里的值。只要这个值不是 0，它就认为条件成立，循环就会一直执行下去。</p>
<ul>
<li><code>while(1)</code>：1 是非零值，条件成立，无限循环。</li>
<li><code>while(-10)</code>：-10 也是一个非零值，条件同样成立，也会无限循环。</li>
<li><code>while(0)</code>：只有当括号里是 0 时，条件才不成立，循环才会终止。</li>
</ul>
<p>所以，在单片机编程中，我们通常用 <code>while(1)</code> 来创建无限循环，因为 1 永远是非零值，这个循环也永远不会停止。</p>

```
</div>

<div class="" style="line-height: 1.8; position: absolute; left: 40%; top: 15%; height: 65%; width: 55%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

- **语法:** `for (初始化; 条件; 更新) { 循环体 }`
- **执行流程:**
    1. `初始化` 执行一次。
    2. 检查 `条件`。若为真，继续；若为假，退出循环。
    3. 执行循环体。
    4. 执行 `更新`。
    5. 回到第2步。
</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="line-height: 1.8; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

问：如果想要让单片机控制的一个 LED 灯，反复亮灭10次，我们应该如何用 `for` 循环来实现呢？
</div>
</div>

<aside class="notes"><p>同学们，在学习了算术、自增自减、赋值、关系运算符后，我们已经掌握了 C 语言中许多核心的“工具”。今天，我们要学习一个非常强大的控制结构——<strong>for 语句</strong>。在单片机编程中，for 语句是实现循环的“主力军”，常用于重复执行任务，比如控制 LED 闪烁、读取传感器数据、或处理数组。接下来，我们一起看看 for 语句的用法和魅力！</p>
<p>for 语句是 C 语言中最常用的循环结构之一，它允许我们以一种<strong>可控的方式重复执行一段代码</strong>。它的语法结构非常清晰，适合需要明确循环次数的场景。</p>
<p><strong>执行过程</strong>：</p>
<ol>
<li><strong>初始化表达式</strong>：在循环开始前执行一次，通常用于初始化循环变量（比如 int i = 0）。</li>
<li><strong>条件表达式</strong>：在每次循环开始前判断是否为真（非 0 为真，0 为假）。如果为真，执行循环体；如果为假，退出循环。</li>
<li><strong>循环体</strong>：执行要重复的代码。</li>
<li><strong>更新表达式</strong>：在每次循环体执行后更新循环变量（比如 i++ 或 i--）。</li>
<li>回到步骤 2，重复判断条件，直到条件为假，循环结束。</li>
</ol>
<p>在单片机里，<code>for</code>循环有两个特殊应用：</p>
<ol>
<li>延时作用：一个空的<code>for</code>循环，比如<code>for(i=0; i&lt;30000; i++);</code>，它什么有用的事都不干，就是让CPU在这里空转，从而消耗掉一段时间。但这种延时不精确。</li>
<li>死循环：如果把括号里的三个部分都省略掉，写成<code>for( ; ; )</code>，它就成了一个无限循环。这在单片机程序里非常常见，因为我们的设备通常需要上电后就一直运行，永不停止。</li>
</ol>
<p>在编写单片机程序时，我们几乎总会看到一个 <code>for( ; ; )</code> 或者 <code>while(1)</code> 循环，它是我们程序的主循环，确保设备能持续执行任务。</p>
<p>现在，请大家思考一个问题：如果我们将一个 LED 灯接到单片机的 P1.0 引脚，并希望它以每秒闪烁一次的频率持续工作，我们应该怎样用 <code>for</code> 循环来实现呢？请大家试着写出伪代码或 C 语言代码。</p>

## 4.2 C语言循环语句和函数的初步认识：while循环
</div>

<div class="" style="position: absolute; left: 0%; top: 15%; height: 65%; width: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

```C
#include <reg52.h>
sbit LED = P1^0;
sbit KEY = P1^1;
void main() {
    LED = 1; // 初始LED灯熄灭
    // 这是一个无限循环，确保程序持续运行
    while(1) {
    // while 循环的条件是：当按键处于按下状态（KEY == 0）时，执行循环体
        while(KEY == 0) {
            // 当按键按下时，将LED设置为低电平，点亮LED
            LED = 0;
        }
```
```C
        // 当按键松开时，while循环的条件不满足，程序跳出循环
        // 将LED设置为高电平，熄灭LED
        LED = 1;
    }
}
```
</div>
<div class="" style="line-height: 1.8; position: absolute; left: 50%; top: 15%; height: 65%; width: 48%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

- **语法:** `while (条件) { ... }`
- **概念:** 只要`条件`为真，循环体就会重复执行。
</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="line-height: 1.8; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

问：如果把这个 `while` 循环改成 `if (KEY == 0)`，会发生什么？简单描述一下改动后的程序行为。
</div>
</div>

<aside class="notes"><p><code>while</code>循环比<code>for</code>循环更简单：<code>while (条件) { ... }</code>。</p>
<p>只要条件为真，就一直重复执行大括号里的代码。</p>
<p>在嵌入式编程中，最经典的结构就是 **<code>while(1)</code>**。因为1在C语言中被认为是“真”，所以这个循环将永远执行下去，构成了我们程序的主循环框架。</p>
<p>如果将 <code>while(KEY == 0)</code> 改成 <code>if (KEY == 0)</code>，当满足条件后，<code>LED = 0;</code> 这行代码即使被执行了，LED 亮起的时间也只有极短的一瞬间，紧接着就会被 <code>LED = 1;</code> 熄灭。</p>
<p>所以，从我们的肉眼来看，LED <strong>几乎不会有任何变化</strong>，它会一直处于熄灭状态。这就是 <code>if</code> 和 <code>while</code> 循环在程序流程控制上的关键区别：<code>if</code> 只判断一次，而 <code>while</code> 只要条件满足就会一直执行。</p>

- **函数定义**：
	- 将复杂程序分解为独立、可复用的模块。
- **函数构成**：
    - **返回值类型**（`void` 表示无返回值）
    - **函数名**
    - **形式参数列表**（也称形参，用于数据传递）
    - **函数体**（包含声明和执行语句）

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >

问：我们在单片机编程中写的 `delay_ms()` 函数，它的返回值类型通常是 `void`。请问，这是为什么？

<aside class="notes"><p>当程序变得越来越复杂时，我们将所有代码堆在一起会变得难以管理。为了解决这个问题，我们需要将代码<strong>模块化</strong>，而这正是<strong>函数</strong>的作用。</p>
<p>一个函数就像一个功能独立的小“工厂”。你给它一些“原材料”（<strong>参数</strong>），它就帮你完成一个特定的任务，最后可能会给你一个“成品”（<strong>返回值</strong>）。</p>
<p>一个函数通常由以下部分组成：</p>
<ul>
<li><strong>返回值类型</strong>：指定函数完成任务后返回的数据类型。如果没有返回值，则使用 <code>void</code>。</li>
<li><strong>函数名</strong>：给函数起一个易于理解的名称。</li>
<li><strong>形式参数列表</strong>：函数接受的输入数据。如果没有参数，也需要写空括号 <code>()</code>。</li>
<li><strong>函数体</strong>：包含执行特定任务的具体代码。</li>
</ul>
<p>我们编写的所有程序，其实都运行在一个最特殊的函数里，它就是 <code>main</code> 函数**。<code>main</code> 函数是整个程序的入口，一个程序中必须有且只能有一个 <code>main</code> 函数。所有代码都被包裹在 <code>main</code> 函数里，从这里开始执行。</p>

- **函数名组成**：字母、数字、下划线，但不能以数字开头。
- **唯一性**：不能与其它函数或变量重名。
- **限制**：不能使用 C 语言**关键字**作为函数名（如 `char`）
</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >

<aside class="notes"><p>关于函数名，它需要遵循一些明确的规则。</p>
<p>首先，函数名可以由字母、数字和下划线自由组合。但请记住，<strong>数字不能作为函数名的开头</strong>。例如，<code>delay_ms</code>是一个合法的函数名，但 <code>2_delay_ms</code> 则不行。其次，函数名必须是唯一的，它<strong>不能与你程序中任何其他函数或变量重名</strong>，否则编译器会不知道你到底想调用哪个。</p>
<p>最后，也是最重要的一点，你绝对不能使用 C 语言的<strong>关键字</strong>作为函数名。关键字是我们程序中已经具备特殊功能的“保留字”，比如 <code>char</code>、<code>int</code>、<code>while</code>、<code>for</code> 等。如果你尝试将一个函数命名为 <code>char()</code>，编译器会把它误认为是变量类型定义，从而导致语法错误。理解并遵守这些规则，是写出专业、高质量代码的第一步。</p>

<aside class="notes"><p>函数的参数列表，也叫形参列表，是函数调用时用来在不同部分之间传递数据的通道。它就像是小工厂的“进料口”，你通过这个口把需要处理的原材料（数据）送进去。</p>
<p>如果一个函数不需要任何外部数据就能完成任务，那么它的参数列表里可以写一个 void 来表示“无参数”。不过，在 C 语言中，这个 void 也可以省略不写。但是，请注意，无论如何那个括号 () 是绝对不能省略的。编译器就是通过这对括号来识别这是一个函数，而不是一个变量。</p>

<aside class="notes"><p>一个函数的<strong>函数体</strong>，包含了<strong>声明语句</strong>部分和<strong>执行语句</strong>部分。</p>
<p><strong>声明语句</strong>部分主要用于声明函数内部使用的所有变量。你可以把它想象成在正式工作前，先准备好所需的工具和材料。而<strong>执行语句</strong>部分，就是完成具体任务的代码。</p>
<p>特别需要注意的是，在 C 语言中，你必须将<strong>所有变量声明放在执行语句之前</strong>。如果顺序颠倒，编译器就会报错，因为它无法识别一个没有预先声明的变量。</p>

## 4.2 C语言循环语句和函数的初步认识：main函数

<div class="" style="position: absolute; left: 0%; top: 15%; height: 65%; width: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

<p><strong>1. 声明语句部分</strong></p>
<p>这个部分位于函数体的开头，用于定义函数内部使用的变量。在你的代码中，**<code>unsigned int i = 0;</code>** 就是一个声明语句。它告诉编译器，我们要在 <code>main</code> 函数中使用一个名为 <code>i</code> 的无符号整型变量，并给它一个初始值0。在C语言中，所有的变量都必须在使用前进行声明。</p>

## 4.3 51单片机常用延时办法

<div class="" style="position: absolute; left: 0%; top: 15%; height: 65%; width: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">
 
<img src="Timestamps/Semester/2025-2026学年第1学期/2025秋单片机原理与应用/理论课/assets/课件第4章 C语言基础以及流水灯的实现/file-20240921142851108.png" alt="" style="width: 1000px; object-fit: fill">

<div class="" style="line-height: 2; position: absolute; left: 50%; top: 15%; height: 65%; width: 48%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

- 非精确延时：`for` / `while` 循环：利用空循环消耗时间，简单但不精确。
- 精确延时：
	1. `_nop_()` 函数：插入一条空指令，延时为一个机器周期。
	2. 定时器：利用专用硬件产生精确时钟信号，是最精确的方法。
</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="line-height: 1.8; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

问：为什么说for/while 循环产生的延迟不精确？
</div>
</div>

<aside class="notes"><p>同学们，在单片机编程中，延时是一个核心概念，它帮助我们控制任务的执行时序。C 语言里实现延时的方法很多，我们可以大致分为<strong>非精确延时</strong>和<strong>精确延时</strong>两大类。</p>
<p>关于非精确延时，这类延时方法简单直接，但无法保证精确的时间长度。</p>
<p>for 和 while 循环。这是最常见的延时方法，通过一个空循环来消耗 CPU 时间，比如 for循环。你可以通过改变 i 的范围来调整延时，但需要注意，循环的执行时间无法从代码中直接判断，它受编译器优化和单片机主频等多种因素影响。</p>
<p>而当我们需要稳定、可靠的延时时，就需要依赖硬件或专用的函数。</p>
<ol>
<li><p><em>nop</em>(); 函数，这是一个简单的库函数，用于插入一条“空操作”指令（No Operation）。它的延时时间非常短，正好是一个机器周期。虽然单次延时极短，但可以用来进行非常精细的时间控制。</p>
</li>
<li><p>定时器，这是最强大、最精确的延时方法。定时器是单片机内部专用的硬件，它能产生精确的时钟信号。我们可以通过配置定时器来产生定时中断，从而实现高精度的延时控制，这在后续课程中会详细介绍，也是单片机编程的一个重点。</p>
</li>
</ol>
<p>总的来说，非精确延时简单快速，适合一般应用；而要实现精准控制，我们则需要依赖 <code>_nop_()</code>, 或更强大的<strong>定时器</strong>。</p>
<p>为什么说for/while 循环产生的延迟不精确：是一种<strong>软件延时</strong>。它依赖于CPU执行指令的速度，而这个速度受到多种不可控因素的影响。相比之下，定时器则是一种<strong>硬件延时</strong>，它不受CPU指令执行速度的影响，从而能够提供更高的精度。</p>

## 4.3 51单片机常用延时办法：人眼最低分辨能力
</div>

<div class="" style="position: absolute; left: 0%; top: 15%; height: 65%; width: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">
 
```C
while(1)
{
	LED = 0;   //点亮小灯
	for (i=0; i<100; i++); //延时一段时间
	LED = 1;
	for (i=0; i<100; i++); //延时一段时间	
}
```
</div>

<div class="" style="line-height: 1.8; position: absolute; left: 50%; top: 15%; height: 65%; width: 45%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

- **现象**：当`for`循环延时次数过少（例如`100`次）时，LED看起来是常亮的，而非闪烁。
- **原因**：当延时极短，LED的亮灭切换频率超出了人眼的感知能力。
- **原理**：人眼对闪烁光线有最低分辨能力，当闪烁频率高于**50Hz**时，人眼会将闪烁视为持续的常亮光线。
</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="line-height: 1.8; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

问：电影本质上不是连续的动态画面，而是一系列快速切换的静态图像。最低需要多少帧？
</div>
</div>

<aside class="notes"><p>同学们，我们上节课编写的 LED 闪烁程序，使用的是 <code>for(i=0; i&lt;30000; i++);</code> 这种方式来延时。</p>
<p>大家有没有尝试把这里的 <code>i</code> 范围改小，比如只循环到 <code>100</code>？如果这么做了，并把程序下载到单片机里，你会发现一个有趣的现象：LED 小灯似乎一直亮着，而不是我们预期的闪烁状态。</p>
<p>这是为什么呢？</p>
<p>这是因为我们人类的眼睛有一个生理特性，叫做<strong>视觉暂留</strong>。简单来说，我们的肉眼对闪烁的光线有一个最低的分辨能力。当闪烁的频率高于约 <strong>50Hz</strong> 时，也就是每秒闪烁超过50次，我们的眼睛就会把这种闪烁看作是持续的、常亮的光线。</p>
<p>如果转换成时间，这意味着当延时时间低于 <strong>20毫秒</strong>（1秒 ÷ 50次 = 0.02秒 = 20毫秒）时，我们的肉眼是无法分辨出小灯是在闪烁的。</p>
<p>所以，当你将延时循环的 <code>i</code> 范围改小到 <code>100</code>，延时时间会变得非常短，远远小于20毫秒，从而超出了我们眼睛的分辨能力，小灯看起来就像是常亮的了。</p>

### 利用断点测量延时<br><br>

1. **设置断点**：在延时函数的前后各设置一个断点。
2. **记录时间**：程序在第一个断点处暂停时，记下**寄存器窗口**中的时间。
3. **计算差值**：继续运行程序，在第二个断点处再次记录时间。两次时间的差值，就是代码的精确执行时间。

### **为什么有的地方不能设置断点** <br><br>

- **原因**：由于编译器默认开启**代码优化**。
- **现象**：部分代码行被优化，导致无法设置断点。
- **解决**：将**优化等级设置为 0**即可。
</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="line-height: 1.8; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">


</div>

<aside class="notes"><p>同学们在设置断点时，可能会发现一个现象：有的位置可以设置断点，而有的地方却不行。这是为什么呢？</p>
<p>这是因为 Keil 编译器本身具备<strong>程序优化</strong>的功能。为了让代码执行得更快、占用更小的内存，编译器可能会对一些代码进行改写或合并。在这种优化过的代码中，你双击的位置可能并没有对应的实际汇编指令，所以断点也就无法设置了。</p>
<p>如果大家希望能在所有代码位置都能设置断点，可以在工程选项里把<strong>优化等级设置为 0</strong>。这相当于告诉 Keil 编译器：“不要进行任何优化。” 这样，每一行 C 语言代码都会有对应的汇编指令，从而允许你在任何位置设置断点，方便你进行更细致的调试。</p>

### 字节控制8个LED <br><br>

- **P0口与LED对应**：P0.0到P0.7依次控制8个LED。
- **一个字节=8位**：用**P0**这个整体，可以同时控制8个LED。
- **代码示例**：`P0 = 0xFE;`
    - `0xFE`转为二进制是`0b11111110`。
    - **0**让灯亮，**1**让灯灭。
    - 效果：**第一个灯亮**，其他7个灯灭。
- **总结**：一行代码就能控制8个LED，非常高效。
</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >

问：中间的两个LED小灯亮起来（即DB3和DB4），其他灯都熄灭，那么`P0`应该等于多少？
</div>
</div>

<aside class="notes"><p>同学们，在之前的课程中，我们已经知道如何用单片机的<strong>P0口</strong>来控制LED小灯。</p>
<p>看这里，我们的<strong>P0.0引脚</strong>通过74HC245芯片控制着<strong>DB0</strong>，而DB0就连接着第一个LED小灯。以此类推，P0.1控制DB1，直到P0.7控制DB7，正好对应我们8个LED小灯。</p>
<p>这意味着，P0口的每一个位，都对应着一个LED小灯！</p>
<p>现在，我们再复习一个重要的概念：<strong>一个字节等于8个位</strong>。</p>
<p>因此，当我们用<strong>P0</strong>这个整体来编程时，实际上我们是在同时控制P0.0到P0.7这8个引脚。</p>
<p>举个例子，如果我们写下<code>P0 = 0xFE;</code> 这行代码，它是什么意思呢？</p>
<p>将<code>0xFE</code>这个十六进制数转换为二进制，就是<code>0b11111110</code>。</p>
<p>在这个二进制数中，<code>0</code>代表低电平，可以用来点亮我们的LED小灯；而<code>1</code>代表高电平，让LED熄灭。所以，<code>0b11111110</code>这个数值，就会让我们的<strong>第一个LED小灯亮起来</strong>，而<strong>剩下的7个灯都处于熄灭状态</strong>。</p>
<p>通过这种方式，我们只需要一行代码，就能轻松控制8个LED小灯的亮灭，是不是非常高效？</p>

## 4.4 流水灯程序编写：更好的流水灯程序
</div>

<div class="" style="position: absolute; left: 5%; top: 15%; height: 65%; width: 45%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

```C
#include<reg52.h>

sbit ADDR0 = P1^0;
sbit ADDR1 = P1^1;
sbit ADDR2 = P1^2;
sbit ADDR3 = P1^3;
sbit ENLED = P1^4;

void main()  
{
	unsigned int i  = 0;   //定义循环变量i，用于软件延时
	unsigned char cnt = 0;  // 定义计数变量cnt，用于移位控制
	ENLED = 0;
	ADDR3 = 1;
```
```C
	ADDR2 = 1;
	ADDR1 = 1;
	ADDR0 = 0;
	while (1)  // 主循环，程序无限循环执行该循环体语句
	{
		P0 = ~(0x01 << cnt); //P0等于1左移cnt位，控制8个LED
		for (i=0; i<20000; i++);  //软件延时
		cnt++;
		if (cnt >= 8)   //移动计数超过7后，再重新从0开始
		{
			cnt = 0;
		}
	}
}
```
</div>

<div class="" style="line-height: 1.8; position: absolute; left: 50%; top: 15%; height: 65%; width: 45%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

- 左移运算符 `<<`：
    - 将一个基础值 `0x01` (`00000001`) 左移，来控制 `0` 的位置。
    - 例如：`0x01 << 2` 得到 `00000100`。
- 按位取反运算符 `~`：
    - 将左移后的结果取反，把 `0` 变成 `1`，把 `1` 变成 `0`。
    - 例如：`~(0x01 << 2)` 得到 `11111011`，即十六进制的 `0xFB`。
</div>

<div class="has-light-background" style="border-radius: 15px; background-color: #e9e9e9; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >
</div>
<div class="" style="line-height: 1.8; position: absolute; left: 0%; top: 85%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" align="center">

问：为什么左移之后还要取反，再赋值给P0口？
</div>
</div>

<aside class="notes"><p>有没有更聪明的办法呢？当然有。</p>
<p>我们观察一下这些数值的规律，每次都是把那个唯一的“0”向左移动了一位。<strong>大家想想我们刚刚学过的运算符，有哪几个可以帮我们实现这种“移动”和“反转”的操作呢？</strong></p>
<p>（稍作停顿，引导学生思考）</p>
<p>没错，就是位移和取反。</p>
<p>我们可以这样做：</p>
<ol>
<li><p>先定义一个基础值 <code>0x01</code>，也就是二进制的 <code>00000001</code>。</p>
</li>
<li><p>用<strong>左移运算符<code>&lt;&lt;</code></strong> 把它移动到我们想要的位置。比如想点亮第3个灯（从第0个开始数），就把它左移2位，变成<code>00000100</code>。</p>
</li>
<li><p>但我们是要低电平点亮，需要的值是<code>11111011</code>。大家看，这两个数正好是每一位都相反。所以，我们只需要再用<strong>按位取反<code>~</code>运算符</strong>，就能得到我们想要的值了！</p>
</li>
</ol>
<p>例如：<code>~(0x01 &lt;&lt; 2)</code> 就得到了 <code>0xFB</code>。这样，我们就不需要写死8个数值了，而是通过计算动态生成它们。</p>

<aside class="notes"><p>到这里，本章的主要内容就告一段落了，现在我们做一个简单的总结。</p>
<p>首先回顾了C语言的变量、常量以及进制基础知识，并深入讲解了算术运算符、自增和自减运算符、赋值运算符和关系运算符的用法和特性。</p>
